# ServiceAccount for the runner pod + namespaced RBAC for Terraform's
# Kubernetes backend (state Secret + locking Lease). Scoped to this namespace
# only. See README "Terraform Kubernetes backend".
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner
  namespace: github-runners
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: terraform-k8s-backend
  namespace: github-runners
rules:
  # Terraform state Secret(s).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete"]
  # State-locking Lease.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-runner-terraform-k8s-backend
  namespace: github-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: terraform-k8s-backend
subjects:
  - kind: ServiceAccount
    name: github-runner
    namespace: github-runners
