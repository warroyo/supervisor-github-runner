# 01-serviceaccount-rbac.yaml
#
# ServiceAccount + Role + RoleBinding for the runner pod.
#
# Why this exists:
#   This runner is a "bootstrap-tier" runner: its job is to run Terraform that
#   provisions infrastructure. We store Terraform state using the Terraform
#   *Kubernetes backend*, which keeps state in an in-cluster Secret and uses a
#   coordination.k8s.io Lease for state locking. That means the runner's
#   ServiceAccount needs just enough RBAC to read/write those two object types
#   -- and nothing else.
#
# Scope:
#   The Role below is namespaced to github-runners ONLY. The runner cannot
#   touch secrets/leases in any other namespace, and has no cluster-scoped
#   permissions. If you later want this runner to provision Kubernetes objects
#   in other namespaces, grant that separately and deliberately -- do not widen
#   this Role.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner
  namespace: github-runners
  # The runner pod runs as this identity. The init container that mints the
  # GitHub token does NOT need any Kubernetes API access -- only the runner
  # (Terraform) workload does, for its state backend.
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: terraform-k8s-backend
  namespace: github-runners
rules:
  # ---- Terraform state Secret ----
  # The Kubernetes backend stores state in a Secret named
  # "tfstate-<workspace>-<secret_suffix>". Terraform needs to create it on
  # first run, then read/update it on every subsequent run. "list" is required
  # because the backend lists secrets (filtered by label) to discover existing
  # state/workspaces.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete"]
  # ---- State locking Lease ----
  # When "lock = true" (the default), the Kubernetes backend acquires a Lease in
  # coordination.k8s.io to prevent concurrent state mutation. It creates the
  # Lease on lock and deletes/updates it on unlock.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-runner-terraform-k8s-backend
  namespace: github-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: terraform-k8s-backend
subjects:
  - kind: ServiceAccount
    name: github-runner
    namespace: github-runners
