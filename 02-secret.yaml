# GitHub App credentials for the init container's token minting.
# Read by the init container ONLY (never the runner container).
#
# Recommended: create this imperatively from your downloaded files instead of
# editing the placeholders below -- see README "Populate the Secret".
# Do NOT commit a real private key in plaintext.
apiVersion: v1
kind: Secret
metadata:
  name: github-app
  namespace: github-runners
type: Opaque
stringData:
  app-id: "REPLACE_WITH_APP_ID"
  private-key.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_THE_CONTENTS_OF_YOUR_GITHUB_APP_PRIVATE_KEY_PEM_FILE
    -----END RSA PRIVATE KEY-----
