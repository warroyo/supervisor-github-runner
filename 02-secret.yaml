# 02-secret.yaml
#
# GitHub App credentials used by the init container to mint a short-lived
# runner registration token.
#
# Why a GitHub App instead of a PAT:
#   - No long-lived user token sitting in the cluster.
#   - Installation tokens are short-lived (~1 hour) and the init container mints
#     a fresh one on every pod start.
#   - The App's private key NEVER enters the runner container (which executes
#     untrusted workflow code) -- only the init container reads this Secret.
#     See 04-deployment.yaml: the Secret is mounted into the init container
#     only.
#
# HOW TO POPULATE THIS SECRET
# ---------------------------
# 1. Create a GitHub App and install it on the target repo (see README.md).
# 2. Note the numeric App ID from the App's settings page.
# 3. Generate a private key for the App -- GitHub gives you a .pem file
#    download (e.g. my-app.2026-01-01.private-key.pem).
# 4. Create the Secret directly from the files instead of hand-editing YAML
#    (this avoids base64/whitespace mistakes with the PEM):
#
#        kubectl -n github-runners create secret generic github-app \
#          --from-literal=app-id='123456' \
#          --from-file=private-key.pem=./my-app.private-key.pem
#
#    That imperative command is the RECOMMENDED path. The manifest below is
#    provided so the credentials can be tracked declaratively if you encrypt it
#    (e.g. with SOPS or Sealed Secrets) -- do NOT commit real key material in
#    plaintext.
#
# The init container's Python script reads:
#   - app-id        -> GITHUB_APP_ID
#   - private-key.pem (mounted as a file) -> the RS256 signing key
apiVersion: v1
kind: Secret
metadata:
  name: github-app
  namespace: github-runners
type: Opaque
stringData:
  # The numeric GitHub App ID (Settings -> Developer settings -> GitHub Apps ->
  # your app -> "App ID"). REPLACE THIS PLACEHOLDER.
  app-id: "REPLACE_WITH_APP_ID"
  # The full PEM-encoded RSA private key downloaded from the GitHub App.
  # REPLACE the placeholder block below with the entire contents of the .pem
  # file, keeping the BEGIN/END lines and the indentation under this key.
  #
  # Prefer the `kubectl create secret ... --from-file` command above; it is far
  # less error-prone than pasting a multi-line PEM into YAML.
  private-key.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_THE_CONTENTS_OF_YOUR_GITHUB_APP_PRIVATE_KEY_PEM_FILE
    -----END RSA PRIVATE KEY-----
