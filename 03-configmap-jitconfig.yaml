# 03-configmap-jitconfig.yaml
#
# The token-minting logic, as a Python script stored in a ConfigMap.
#
# Why a ConfigMap + stock python:3-slim instead of a custom image:
#   This is a bootstrap-tier runner -- we want the fewest moving parts and
#   nothing to build/host. Mounting this script into the unmodified
#   python:3-slim image means there is no registry, no image build pipeline,
#   and no Dockerfile to maintain for the privileged half of the pod.
#
# What the init container does with this (see 04-deployment.yaml):
#   1. Build a short-lived JWT signed with the GitHub App private key (RS256,
#      via PyJWT). The key is mounted from the github-app Secret into the init
#      container ONLY.
#   2. Exchange the JWT for a short-lived *installation* access token scoped to
#      the App's installation on the target repo.
#   3. Call POST /repos/{owner}/{repo}/actions/runners/generate-jitconfig to
#      mint a Just-In-Time runner configuration.
#   4. Write the encoded JIT config to a shared emptyDir, which the runner
#      container then consumes via `run.sh --jitconfig`.
#
# The runner container never sees the App private key or the installation
# token -- only the (single-use, ephemeral) JIT config blob.
apiVersion: v1
kind: ConfigMap
metadata:
  name: runner-jitconfig
  namespace: github-runners
data:
  mint_jitconfig.py: |
    #!/usr/bin/env python3
    """Mint a Just-In-Time (JIT) GitHub Actions runner config.

    Reads a GitHub App private key + App ID, signs a JWT, exchanges it for an
    installation token, requests an ephemeral JIT runner config for a repo, and
    writes the encoded config to a shared volume for the runner container.

    Dependencies: PyJWT[crypto] (installed at init-container start). Everything
    else uses the Python standard library so there is nothing else to install.
    """
    import json
    import os
    import sys
    import time
    import urllib.error
    import urllib.request

    import jwt  # PyJWT

    API = os.environ.get("GITHUB_API_URL", "https://api.github.com").rstrip("/")
    APP_ID = os.environ["GITHUB_APP_ID"]
    OWNER = os.environ["REPO_OWNER"]
    REPO = os.environ["REPO_NAME"]
    RUNNER_NAME = os.environ.get("RUNNER_NAME", "lab-supervisor-runner")
    LABELS = os.environ.get("RUNNER_LABELS", "self-hosted,lab-supervisor")
    KEY_PATH = os.environ.get("APP_PRIVATE_KEY_PATH", "/github-app/private-key.pem")
    OUT_PATH = os.environ.get("JITCONFIG_PATH", "/runner-config/jitconfig")


    def api(method, path, token, data=None):
        """Make a GitHub API call and return the parsed JSON response."""
        url = path if path.startswith("http") else API + path
        body = json.dumps(data).encode() if data is not None else None
        req = urllib.request.Request(url, data=body, method=method)
        req.add_header("Authorization", "Bearer " + token)
        req.add_header("Accept", "application/vnd.github+json")
        req.add_header("X-GitHub-Api-Version", "2022-11-28")
        req.add_header("User-Agent", "supervisor-github-runner-init")
        if body is not None:
            req.add_header("Content-Type", "application/json")
        try:
            with urllib.request.urlopen(req) as resp:
                return json.loads(resp.read().decode())
        except urllib.error.HTTPError as exc:
            detail = exc.read().decode(errors="replace")
            sys.stderr.write(
                "GitHub API {} {} failed: HTTP {}\n{}\n".format(
                    method, url, exc.code, detail
                )
            )
            raise


    def main():
        with open(KEY_PATH, "rb") as fh:
            private_key = fh.read()

        # 1. Build the App JWT. GitHub requires exp - iat <= 600s; we backdate
        #    iat by 30s to tolerate clock skew between the pod and GitHub.
        now = int(time.time())
        app_jwt = jwt.encode(
            {"iat": now - 30, "exp": now + 480, "iss": APP_ID},
            private_key,
            algorithm="RS256",
        )

        # 2. Resolve the App's installation on the target repo, then mint a
        #    short-lived installation access token from it.
        installation = api("GET", "/repos/{}/{}/installation".format(OWNER, REPO), app_jwt)
        token_resp = api(
            "POST",
            "/app/installations/{}/access_tokens".format(installation["id"]),
            app_jwt,
            data={},
        )
        inst_token = token_resp["token"]

        # 3. Request a JIT runner config. runner_group_id 1 is the always-present
        #    "Default" self-hosted runner group. The runner registered from this
        #    config is ephemeral: it runs exactly one job, then deregisters.
        jit = api(
            "POST",
            "/repos/{}/{}/actions/runners/generate-jitconfig".format(OWNER, REPO),
            inst_token,
            data={
                "name": RUNNER_NAME,
                "runner_group_id": 1,
                "labels": [s.strip() for s in LABELS.split(",") if s.strip()],
                "work_folder": "_work",
            },
        )

        # 4. Hand the encoded config off to the runner container via the shared
        #    emptyDir. 0600 so only the (shared) runtime UID can read it.
        with open(OUT_PATH, "w") as fh:
            fh.write(jit["encoded_jit_config"])
        os.chmod(OUT_PATH, 0o600)
        print("Wrote JIT config for runner '{}' to {}".format(RUNNER_NAME, OUT_PATH))


    if __name__ == "__main__":
        main()
